<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f7;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            padding: 2rem;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding-bottom: 1.5rem;
        }

        .image-container {
            width: 100%;
            height: 220px;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 10px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-title {
            font-size: 1.25rem;
            margin: 1.5rem 0 0 0;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Vehicle Showcase</h1>
    </header>

    <div class="container">
        <div class="grid">

            <div class="card">
                <div class="image-container">
                    <img src="IM-LS9-hesucar-2-1.webp" alt="IM LS9">
                </div>
                <h3 class="card-title">IM LS9</h3>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="MAXUS eTERRON 9_007_Offroad-Front.jpg" alt="MAXUS eTERRON 9">
                </div>
                <h3 class="card-title">MAXUS eTERRON 9</h3>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="New-Voyah-Dreamer-3.jpg" alt="Voyah Dreamer">
                </div>
                <h3 class="card-title">Voyah Dreamer</h3>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="xpeng-x9-china-2023-01-min.jpg" alt="XPENG X9">
                </div>
                <h3 class="card-title">XPENG X9</h3>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="1730354237-car-space-m.avif" alt="Zeekr 009">
                </div>
                <h3 class="card-title">Zeekr 009</h3>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="DSC00398.jpg" alt="Li Auto Mega">
                </div>
                <h3 class="card-title">Li Auto Mega</h3>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="KU1A3499.webp" alt="WaterCar EV">
                </div>
                <h3 class="card-title">WaterCar EV</h3>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="2024_Yangwang_U8_(front).jpg" alt="Yangwang U8">
                </div>
                <h3 class="card-title">Yangwang U8</h3>
            </div>

        </div>
    </div>

</body>
</html>
